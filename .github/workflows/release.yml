name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT_HASH: ${{ github.sha }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail

          mkdir -p dist/package

          commit_ts="$(git log -1 --format=%ct)"

          UTS_VERSION="$VERSION" \
          UTS_COMMIT_HASH="$COMMIT_HASH" \
          UTS_COMMIT_TS="$commit_ts" \
          npm run compile

          chmod +x dist/uts

          asset_basename="uts_${VERSION}_${GOOS}_${GOARCH}"

          if [ "$GOOS" = "windows" ]; then
            mv dist/uts dist/package/uts.js
            cat > dist/package/uts.cmd <<'EOF'
@echo off
node "%~dp0\uts.js" %*
EOF
            (
              cd dist/package
              zip -q "../${asset_basename}.zip" uts.js uts.cmd
            )
          else
            mv dist/uts dist/package/uts
            tar -C dist/package -czf "dist/${asset_basename}.tar.gz" uts
          fi

          rm -rf dist/package

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/uts_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum uts_* > SHA256SUMS

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - build
      - checksums

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/uts_*.tar.gz
            dist/uts_*.zip
            dist/SHA256SUMS
