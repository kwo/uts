name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    name: build
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build archive
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT_HASH: ${{ github.sha }}
        run: |
          set -euo pipefail

          mkdir -p dist/package

          commit_ts="$(git log -1 --format=%ct)"

          UTS_VERSION="$VERSION" \
          UTS_COMMIT_HASH="$COMMIT_HASH" \
          UTS_COMMIT_TS="$commit_ts" \
          npm run compile

          chmod +x dist/uts

          mv dist/uts dist/package/uts
          tar -C dist/package -czf "dist/uts_${VERSION}.tar.gz" uts

          rm -rf dist/package

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-archive
          path: dist/uts_${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  release:
    name: github-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release archive
        uses: actions/download-artifact@v8
        with:
          name: release-archive
          path: dist

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum "uts_${GITHUB_REF_NAME}.tar.gz" > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/uts_${{ github.ref_name }}.tar.gz
            dist/SHA256SUMS
